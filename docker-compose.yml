version: '3.8'

services:
  digital-wallet-db:
    image: postgres:15
    container_name: digital_wallet_db_container
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: digital_wallet_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
  redis:
      image: redis:alpine
      container_name: digital_wallet_redis
      ports:
        - "6379:6379"
volumes:
  pgdata: